{% extends "base.html" %}

{% block title %}
EarthQuakeWatch | Events
{% endblock %}

{% block body %}
<div class="container-fluid container-lg py-3 py-md-4">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2 mb-3">
    <h1 class="h3 mb-0">მიწისძვრები</h1>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-header fw-semibold">მიწისძვრის დამატება</div>
    <div class="card-body">
      <form id="addEventForm" class="row g-3">
        <div class="col-md-6">
          <label for="eventIdInput" class="form-label">Event ID *</label>
          <input id="eventIdInput" type="number" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label for="seiscompOidInput" class="form-label">SeisComP OID *</label>
          <input id="seiscompOidInput" type="text" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label for="originTimeInput" class="form-label">Origin Time (ISO 8601) *</label>
          <input
            id="originTimeInput"
            type="text"
            class="form-control"
            placeholder="2024-07-22T08:08:09.660000"
            required
          >
        </div>
        <div class="col-md-6">
          <label for="originMsecInput" class="form-label">Origin msec</label>
          <input id="originMsecInput" type="number" class="form-control">
        </div>
        <div class="col-md-6">
          <label for="latitudeInput" class="form-label">Latitude *</label>
          <input id="latitudeInput" type="number" step="any" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label for="longitudeInput" class="form-label">Longitude *</label>
          <input id="longitudeInput" type="number" step="any" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label for="depthInput" class="form-label">Depth (km) *</label>
          <input id="depthInput" type="number" step="any" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label for="mlInput" class="form-label">Magnitude (ML) *</label>
          <input id="mlInput" type="number" step="any" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label for="regionGeInput" class="form-label">Region GE</label>
          <input id="regionGeInput" type="text" class="form-control">
        </div>
        <div class="col-md-4">
          <label for="regionEnInput" class="form-label">Region EN</label>
          <input id="regionEnInput" type="text" class="form-control">
        </div>
        <div class="col-md-4">
          <label for="areaInput" class="form-label">Area</label>
          <input id="areaInput" type="text" class="form-control">
        </div>
        <div class="col-12">
          <button id="addEventSubmitBtn" type="submit" class="btn btn-primary">დამატება</button>
        </div>
      </form>
      <div id="addEventStatus" class="small mt-3 text-muted"></div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-header fw-semibold">ივენთების სია</div>
    <div class="card-body">
      <div id="eventsStatus" class="text-muted mb-3">იტვირთება...</div>
      <div class="table-responsive">
        <table class="table table-sm table-hover align-middle mb-0 text-nowrap">
          <thead>
            <tr>
              <th>Event ID</th>
              <th>SeisComP OID</th>
              <th>Origin Time</th>
              <th>Magnitude (ML)</th>
              <th>Depth (km)</th>
              <th>Lat</th>
              <th>Lon</th>
              <th>Region</th>
            </tr>
          </thead>
          <tbody id="eventsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/events/events.js') }}" defer></script>
{% endblock %}
