[Unit]
Description=IES Monitoring Main Flask App
After=network.target

[Service]
User=sysop
Group=www-data
WorkingDirectory=/var/www/Ies_Monitoring-main

Environment="PATH=/var/www/Ies_Monitoring-main/venv/bin"

ExecStart=/var/www/Ies_Monitoring-main/venv/bin/gunicorn \
    -w 4 \
    -b 127.0.0.1:5000 \
    app:app

Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target