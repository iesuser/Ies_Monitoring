{% extends "base.html" %}

{% block title %}
    IES Monitoring - Change Password
{% endblock %}

{% block body %}
<div class="py-4 py-lg-5">
    <div class="row justify-content-center align-items-center g-4 g-lg-5">
        <div class="col-lg-6 col-xl-5 d-none d-lg-block">
            <img
                src="{{ url_for('static', filename='images/login_draw.webp') }}"
                class="img-fluid"
                alt="Change password illustration"
            >
        </div>

        <div class="col-12 col-md-10 col-lg-6 col-xl-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <h2 class="h3 mb-2">Change Password</h2>
                        <p class="text-muted mb-0">Update your password and continue securely.</p>
                    </div>

                    <form id="changePasswordForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="currentPassword">Current password</label>
                            <div class="input-group input-group-lg">
                                <input
                                    type="password"
                                    id="currentPassword"
                                    name="currentPassword"
                                    class="form-control"
                                    placeholder="Enter current password"
                                    autocomplete="current-password"
                                    required
                                />
                                <button type="button" id="toggleCurrentPassword" class="btn btn-outline-secondary togglePassword">
                                    <img src="/static/images/eye-hide.svg" alt="Toggle current password" width="20" height="20" class="togglePasswordImg" id="toggleCurrentPasswordImg">
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">New password</label>
                            <div class="input-group input-group-lg">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="Enter new password"
                                    autocomplete="new-password"
                                    required
                                />
                                <button type="button" id="toggleNewPassword" class="btn btn-outline-secondary togglePassword">
                                    <img src="/static/images/eye-hide.svg" alt="Toggle new password" width="20" height="20" class="togglePasswordImg" id="toggleNewPasswordImg">
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="retypePassword">Repeat new password</label>
                            <div class="input-group input-group-lg">
                                <input
                                    type="password"
                                    id="retypePassword"
                                    name="retypePassword"
                                    class="form-control"
                                    placeholder="Repeat new password"
                                    autocomplete="new-password"
                                    required
                                />
                                <button type="button" id="toggleRetypePassword" class="btn btn-outline-secondary togglePassword">
                                    <img src="/static/images/eye-hide.svg" alt="Toggle repeat password" width="20" height="20" class="togglePasswordImg" id="toggleRetypePasswordImg">
                                </button>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Change Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script type="text/javascript" src="{{ url_for('static', filename='js/auth/changePassword.js') }}" defer></script>
{% endblock %}
